var notes = [];
var activeFilter = "hepsi";

function loadNotes() {
  notes = JSON.parse(localStorage.getItem("kitap-notlari-v3") || "[]");
}

function saveNotes() {
  localStorage.setItem("kitap-notlari-v3", JSON.stringify(notes));
}

function toggleView() {
  var isAdd = document.getElementById("add-view").style.display === "block";
  document.getElementById("add-view").style.display = isAdd ? "none" : "block";
  document.getElementById("list-view").style.display = isAdd ? "block" : "none";
  document.getElementById("toggle-btn").textContent = isAdd ? "+ Not Ekle" : "← Geri";
  document.getElementById("toggle-btn").className = isAdd ? "btn-add" : "btn-back";
  if (isAdd) { renderNotes(); resetPreview(); }
}

function resetPreview() {
  var prev = document.getElementById("cat-preview");
  prev.className = "category-preview";
  prev.innerHTML = "";
}

function cleanToken(word) {
  if (!word) return "";
  return word.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, "").trim();
}

function analyzeNoteText(text) {
  var scores = { tarih:0, felsefe:0, ekonomi:0, teknoloji:0, edebiyat:0, dilbilimi:0 };
  var evidence = [];
  var structures = [];

  if (!text || text.trim().length < 3) {
    return { winner:"genel", scores:scores, evidence:[], structures:["Standart Not"] };
  }

  var lowerText = text.toLowerCase();
  var sentences = lowerText.split(/[.!?;\n]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
  var lines = text.split("\n").map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
  var slashCount = (text.match(/\//g) || []).length;

  // Şiir formu
  if (lines.length >= 3 || slashCount >= 2) {
    structures.push("Şiir / Manzum Form");
    scores.edebiyat += 15;
  }

  // Cümle analizi
  for (var si = 0; si < sentences.length; si++) {
    var sentence = sentences[si];
    if (sentence.match(/(yılında|yüzyılda|milattan önce|asırda)/) || sentence.match(/\b(1[4-9]\d{2}|20\d{2})\b/)) {
      if (structures.indexOf("Kronolojik Olay") === -1) structures.push("Kronolojik Olay");
      scores.tarih += 10;
    }
    if (sentence.match(/(bence|bana göre|kanımca|paradoks|sanıyorum|fikrimce)/)) {
      if (structures.indexOf("Şahsi Sav / Yorum") === -1) structures.push("Şahsi Sav / Yorum");
      scores.felsefe += 5;
    }
    if (sentence.match(/(denir|tanımlanır|açıklanır|anlamına gelir)/)) {
      if (structures.indexOf("Tanım") === -1) structures.push("Tanım");
    }
    if (sentence.match(/(göre|aktardığı|belirttiği|alıntı)/)) {
      if (structures.indexOf("Kaynaklı Alıntı") === -1) structures.push("Kaynaklı Alıntı");
    }
  }

  // Aktör eşleşmesi
  var cats = Object.keys(THEMES);
  for (var ci = 0; ci < cats.length; ci++) {
    var cat = cats[ci];
    var catData = THEMES[cat];
    for (var ai = 0; ai < catData.actors.length; ai++) {
      var actor = catData.actors[ai];
      if (lowerText.indexOf(actor) !== -1) {
        scores[cat] += 25;
        if (evidence.indexOf(actor) === -1) evidence.push(actor);
      }
    }
  }

  // Tamlama eşleşmesi
  for (var ci2 = 0; ci2 < cats.length; ci2++) {
    var cat2 = cats[ci2];
    var catData2 = THEMES[cat2];
    for (var pi = 0; pi < catData2.phrases.length; pi++) {
      var phrase = catData2.phrases[pi];
      if (lowerText.indexOf(phrase) !== -1) {
        scores[cat2] += 15;
        if (evidence.indexOf(phrase) === -1) evidence.push(phrase + " (tamlama)");
      }
    }
  }

  // Kelime eşleşmesi
  var tokens = lowerText.split(/\s+/).map(cleanToken).filter(function(t) { return t.length > 2; });
  for (var ti = 0; ti < tokens.length; ti++) {
    var token = tokens[ti];
    for (var ci3 = 0; ci3 < cats.length; ci3++) {
      var cat3 = cats[ci3];
      var catData3 = THEMES[cat3];
      for (var ki = 0; ki < catData3.keywords.length; ki++) {
        var keyword = catData3.keywords[ki];
        if (token === keyword || (token.indexOf(keyword) === 0 && token.length - keyword.length <= 4)) {
          scores[cat3] += 3;
          if (evidence.indexOf(keyword) === -1) evidence.push(keyword);
        }
      }
    }
  }

  // Soru işareti bonusu
  var soruSayisi = (text.match(/\?/g) || []).length;
  scores.felsefe += soruSayisi * 5;
  if (soruSayisi > 0 && structures.indexOf("Soru / Sorgulama") === -1) structures.push("Soru / Sorgulama");

  // Kısa + virgüllü
  if (text.length < 120 && text.indexOf(",") !== -1) {
    scores.edebiyat += 4;
    scores.felsefe += 2;
  }

  // Keşke / belki / acaba
  if (lowerText.indexOf("keşke") !== -1 || lowerText.indexOf("belki") !== -1 || lowerText.indexOf("acaba") !== -1) {
    scores.felsefe += 6;
  }

  // En yüksek puan
  var maxScore = -1;
  var winner = "genel";
  for (var ci4 = 0; ci4 < cats.length; ci4++) {
    var c = cats[ci4];
    if (scores[c] > maxScore && scores[c] > 0) {
      maxScore = scores[c];
      winner = c;
    }
  }

  if (structures.length === 0) structures.push("Standart Not");

  return { winner:winner, scores:scores, evidence:evidence.slice(0,5), structures:structures };
}

function runLocalNLP() {
  var text = document.getElementById("text-input").value.trim();
  var prev = document.getElementById("cat-preview");
  if (!text || text.length < 5) { prev.className = "category-preview"; prev.innerHTML = ""; return; }

  var start = performance.now();
  var analysis = analyzeNoteText(text);
  var duration = (performance.now() - start).toFixed(1);

  var th = THEMES[analysis.winner] || { label:"Genel", emoji:"📖", accent:"#94a3b8" };
  var evidenceText = analysis.evidence.length > 0 ? analysis.evidence.join(", ") : "Belirgin kanıt bulunamadı";

  prev.className = "category-preview visible";
  prev.innerHTML = "<div><span class='ai-badge'>⚡ Yerel NLP (" + duration + " ms)</span></div>" +
    "<div style='font-size:14px;margin:4px 0'>" + th.emoji + " Kategori: <strong style='color:" + th.accent + "'>" + th.label + "</strong></div>" +
    "<div class='nlp-report' style='margin-top:4px'>" +
    "<div class='nlp-line'><span class='nlp-label'>⚙️ Yapı:</span> <span>" + analysis.structures.join(" | ") + "</span></div>" +
    "<div class='nlp-line'><span class='nlp-label'>🔍 Kanıtlar:</span> <span>" + evidenceText + "</span></div>" +
    "</div>";
}

function addNote() {
  var text = document.getElementById("text-input").value.trim();
  var book = document.getElementById("book-input").value.trim();
  if (!text) return;
  var analysis = analyzeNoteText(text);
  notes.unshift({ id:Date.now(), text:text, book:book, theme:analysis.winner, structures:analysis.structures, evidence:analysis.evidence, date:new Date().toISOString(), aiCategorized:true });
  saveNotes();
  document.getElementById("text-input").value = "";
  document.getElementById("book-input").value = "";
  toggleView();
}

function deleteNote(id) {
  notes = notes.filter(function(n) { return n.id !== id; });
  saveNotes(); renderNotes();
}

function renderFilters() {
  var usedThemes = [];
  for (var i = 0; i < notes.length; i++) {
    if (usedThemes.indexOf(notes[i].theme) === -1) usedThemes.push(notes[i].theme);
  }
  var allFilters = [{ key:"hepsi", label:"Hepsi", emoji:"✨" }];
  var cats = Object.keys(THEMES);
  for (var ci = 0; ci < cats.length; ci++) {
    if (usedThemes.indexOf(cats[ci]) !== -1) {
      allFilters.push({ key:cats[ci], label:THEMES[cats[ci]].label, emoji:THEMES[cats[ci]].emoji });
    }
  }
  if (usedThemes.indexOf("genel") !== -1) allFilters.push({ key:"genel", label:"Genel", emoji:"📖" });

  var html = "";
  for (var fi = 0; fi < allFilters.length; fi++) {
    var f = allFilters[fi];
    html += "<button class='filter-btn " + (activeFilter === f.key ? "active" : "") + "' onclick=\"setFilter('" + f.key + "')\">" + f.emoji + " " + f.label + "</button>";
  }
  document.getElementById("filters").innerHTML = html;
}

function setFilter(f) { activeFilter = f; renderNotes(); }

function renderNotes() {
  var s = document.getElementById("search").value.toLowerCase();
  var filtered = notes.filter(function(n) {
    var matchesSearch = n.text.toLowerCase().indexOf(s) !== -1 || (n.book && n.book.toLowerCase().indexOf(s) !== -1);
    var matchesFilter = activeFilter === "hepsi" || n.theme === activeFilter;
    return matchesSearch && matchesFilter;
  });
  document.getElementById("note-count").textContent = notes.length + " not";
  renderFilters();

  if (filtered.length === 0) {
    document.getElementById("notes-container").innerHTML = "<div class='empty'><div class='icon'>📭</div><p>" + (notes.length === 0 ? "Henüz not yok. İlk notunu ekle!" : "Sonuç bulunamadı.") + "</p></div>";
    return;
  }

  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var n = filtered[i];
    var th = THEMES[n.theme] || { emoji:"📖", bg:"#111827", border:"#475569", accent:"#94a3b8", label:"Genel" };
    var date = new Date(n.date).toLocaleDateString("tr-TR", { day:"numeric", month:"long", year:"numeric" });
    var structuresText = (n.structures && n.structures.length > 0) ? n.structures.join(" | ") : "Standart Not";
    var evidenceText = (n.evidence && n.evidence.length > 0) ? n.evidence.join(", ") : "Yok";
    html += "<div class='note-card' style='background:" + th.bg + ";border-color:" + th.border + ";border-left-color:" + th.border + "'>" +
      "<div class='note-watermark'>" + th.emoji + "</div>" +
      "<div class='note-top'><span class='note-badge' style='background:" + th.accent + "22;color:" + th.accent + "'>" + th.emoji + " " + th.label + "</span>" +
      "<button class='note-delete' onclick='deleteNote(" + n.id + ")'>×</button></div>" +
      (n.book ? "<div class='note-book' style='color:" + th.accent + "'>📚 " + n.book + "</div>" : "") +
      "<p class='note-text'>" + n.text + "</p>" +
      "<div class='nlp-report'>" +
      "<div class='nlp-line'><span class='nlp-label'>⚙️ Yapı:</span> <span>" + structuresText + "</span></div>" +
      "<div class='nlp-line'><span class='nlp-label'>🔍 Kanıtlar:</span> <span>" + evidenceText + "</span></div>" +
      "</div>" +
      "<div class='note-meta'><span class='note-date'>" + date + "</span>" +
      (n.aiCategorized ? "<span class='note-ai-tag'>✦ NLP</span>" : "") + "</div></div>";
  }
  document.getElementById("notes-container").innerHTML = html;
}

function notlariKurtar() {
  var eskiAnahtarlar = ["kitap-notlari","kitap-notlari-v1","kitap-notlari-v2","kitapNotlari","kitap_notlari","notes","bookNotes"];
  var bulunanNotlar = [];
  for (var i = 0; i < eskiAnahtarlar.length; i++) {
    try {
      var raw = localStorage.getItem(eskiAnahtarlar[i]);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].text) {
          bulunanNotlar = bulunanNotlar.concat(parsed);
          localStorage.removeItem(eskiAnahtarlar[i]);
        }
      }
    } catch(e) {}
  }

  if (bulunanNotlar.length === 0) {
    alert("Hiçbir yerde eski not bulunamadı. Notlar bu cihazda kayıtlı olmayabilir.");
    return;
  }

  var mevcutIdler = {};
  for (var ni = 0; ni < notes.length; ni++) mevcutIdler[notes[ni].id] = true;

  var yeniNotlar = [];
  for (var bi = 0; bi < bulunanNotlar.length; bi++) {
    var n = bulunanNotlar[bi];
    if (!mevcutIdler[n.id]) {
      var analysis = analyzeNoteText(n.text || "");
      yeniNotlar.push({ id:n.id || Date.now() + Math.random(), text:n.text, book:n.book || "", theme:analysis.winner, structures:analysis.structures, evidence:analysis.evidence, date:n.date || new Date().toISOString(), aiCategorized:true });
    }
  }

  notes = notes.concat(yeniNotlar);
  notes.sort(function(a, b) { return b.id - a.id; });
  saveNotes();
  localStorage.setItem("kitap-notlari-v3-migrated", "1");
  document.getElementById("kurtar-btn").style.display = "none";
  document.getElementById("migration-banner").style.display = "none";
  renderNotes();
  alert(yeniNotlar.length + " not kurtarıldı! 🎉");
}

function checkMigration() {
  var eskiAnahtarlar = ["kitap-notlari","kitap-notlari-v1","kitap-notlari-v2"];
  var toplamEski = 0;
  for (var i = 0; i < eskiAnahtarlar.length; i++) {
    try {
      var raw = localStorage.getItem(eskiAnahtarlar[i]);
      if (raw) { var p = JSON.parse(raw); if (Array.isArray(p)) toplamEski += p.length; }
    } catch(e) {}
  }
  if (toplamEski > 0 && !localStorage.getItem("kitap-notlari-v3-migrated")) {
    document.getElementById("migration-desc").textContent = toplamEski + " eski not bulundu. NLP ile yeniden kategorilendirip aktaralım mı?";
    document.getElementById("migration-bar").style.width = "0%";
    document.getElementById("migration-banner").style.display = "block";
  }
}

function startMigration() {
  notlariKurtar();
}

loadNotes();
checkMigration();
renderNotes();

setTimeout(function() {
  if (notes.length === 0) document.getElementById("kurtar-btn").style.display = "block";
}, 600);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Kitap-notlari/sw.js').catch(function() {});
}

var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'flex';
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() { deferredPrompt = null; document.getElementById('install-btn').style.display = 'none'; });
}
window.addEventListener('appinstalled', function() { document.getElementById('install-btn').style.display = 'none'; });
</script>
