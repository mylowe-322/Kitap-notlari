    actors: ["saussure", "chomsky", "jakobson", "panini", "bloomfield", "sapir", "whorf", "kaşgarlı mahmud", "türkolog", "şemseddin sami"]
  }
};

let notes = [];
let activeFilter = "hepsi";

function loadNotes() {

  if (notes.length === 0) {

// ── 3 KATMANLI YEREL NLP VE ANLAM ÇIKARMA MOTORU ──────────────────
function cleanToken(word) {
  if (!word) return "";
  return word.toLowerCase()
    .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, "")
    .replace(/’/g, "")
    .trim();
}

function analyzeNoteText(text) {
  const info = {
    categoryScores: { tarih: 0, felsefe: 0, ekonomi: 0, teknoloji: 0, edebiyat: 0, dilbilimi: 0 },
    matchedEvidence: [],
    matchedPhrases: [],
    matchedActors: [],
    structures: []
  };

  if (!text || text.trim().length < 3) return info;

  const originalText = text;
  const lowerText = text.toLowerCase();
  const sentences = lowerText.split(/[.!?;\n]+/).map(s => s.trim()).filter(s => s.length > 0);

  // ── 3. KATMAN: YAPISAL ANALİZ VE CÜMLE İÇİ İŞARETÇİLER ──
  
  // Şiir Formu Kontrolü (Alt alta satırlar veya eğik çizgi kullanımı)
  const lines = originalText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const slashCount = (originalText.match(/\//g) || []).length;
  if (lines.length >= 3 || slashCount >= 2) {
    info.structures.push("Şiir / Manzum Form");
    info.categoryScores.edebiyat += 15;
  }

  // Cümle Anlamı ve Bilgi Türü Tespiti
  sentences.forEach(sentence => {
    
    // ...dir / ...denir / ...tanımlanır -> [Tanım]
    if (sentence.match(/(dir|dır|dur|dür|denir|tanımlanır|açıklanır|ifade eder|anlamına gelir)\s*$/) || sentence.includes("denir") || sentence.includes("tanımlanır")) {
      if (!info.structures.includes("Tanım")) info.structures.push("Tanım");
    }

    // ...yılında / ...yüzyılda / M.Ö. / (1750) -> [Kronolojik Olay]
    if (sentence.match(/(yılında|yüzyılda|yy\.|m\.ö\.|m\.s\.|milattan önce|asırda)/) || sentence.match(/\b(1[4-9]\d{2}|20\d{2})\b/)) {
      if (!info.structures.includes("Kronolojik Olay")) info.structures.push("Kronolojik Olay");
      info.categoryScores.tarih += 10;
    }

    // Bence / kanımca / iddia / tez / paradoks -> [Şahsi Sav / Yorum]
    if (sentence.match(/(bence|bana göre|kanımca|iddiam|iddia|tezim|tez|paradoks|bence|kanımızca|bana kalırsa|görüşüme göre|sanıyorum|fikrimce)/)) {
      if (!info.structures.includes("Şahsi Sav / Yorum")) info.structures.push("Şahsi Sav / Yorum");
      info.categoryScores.felsefe += 5;
    }

    // -e göre / aktardığı üzere -> [Kaynaklı Alıntı]
    if (sentence.match(/(-e göre|-a göre|göre|aktardığı|belirttiği|yazdığı üzere|sözüyle|alıntı|atfen|atfedilen)/)) {
      if (!info.structures.includes("Kaynaklı Alıntı")) info.structures.push("Kaynaklı Alıntı");
    }

    // Bağlaç ve Vurgu Analizi
    const contrastMarkers = ["ama", "fakat", "ancak", "lakin", "oysaki", "buna karşın", "yine de"];
    contrastMarkers.forEach(marker => {
      const idx = sentence.indexOf(" " + marker + " ");
      if (idx !== -1) {
        const postContrast = sentence.substring(idx + marker.length + 2);
        Object.entries(THEMES).forEach(([cat, catData]) => {
          catData.keywords.forEach(keyword => {
            if (postContrast.includes(keyword)) {
              info.categoryScores[cat] += 4;
              if (!info.matchedEvidence.includes(`${keyword} (vurgulu)`)) {
                info.matchedEvidence.push(`${keyword} (vurgulu)`);
              }
            }
          });
        });
      }
    });

  });

  // Özne ve Aktör Takibi (Doğrudan tetikleyiciler)
  Object.entries(THEMES).forEach(([cat, catData]) => {
    catData.actors.forEach(actor => {
      const regex = new RegExp("\\b" + actor + "\\b", "gi");
      if (regex.test(lowerText)) {
        info.categoryScores[cat] += 25;
        info.matchedActors.push(actor);
        if (!info.matchedEvidence.includes(actor)) {
          info.matchedEvidence.push(actor);
        }
      }
    });
  });

  // ── 2. KATMAN: TAMLAMA VE KALIP YAKALAMA ──
  Object.entries(THEMES).forEach(([cat, catData]) => {
    catData.phrases.forEach(phrase => {
      if (lowerText.includes(phrase)) {
        info.categoryScores[cat] += 15;
        info.matchedPhrases.push(phrase);
        if (!info.matchedEvidence.includes(`${phrase} (tamlama)`)) {
          info.matchedEvidence.push(`${phrase} (tamlama)`);
        }
      }
    });
  });

  // ── 1. KATMAN: KELİME DAĞARCIĞI VE KÖK ANALİZİ ──
  const tokens = lowerText.split(/\s+/).map(cleanToken).filter(t => t.length > 2);
  
  tokens.forEach(token => {
    Object.entries(THEMES).forEach(([cat, catData]) => {
      catData.keywords.forEach(keyword => {
        if (token === keyword || (token.startsWith(keyword) && token.length - keyword.length <= 4)) {
          info.categoryScores[cat] += 3;
          
          const existingIdx = info.matchedEvidence.indexOf(keyword);
          if (existingIdx === -1) {
            const isAlreadyMatched = info.matchedPhrases.some(p => p.includes(keyword)) || info.matchedActors.includes(keyword);
            if (!isAlreadyMatched) {
              info.matchedEvidence.push(keyword);
            }
          }
        }
      });
    });
  });

  // En yüksek skoru alan kategoriyi bul
  let maxScore = -1;
  let winner = "genel";
  
  Object.entries(info.categoryScores).forEach(([cat, score]) => {
    if (score > maxScore && score > 0) {
      maxScore = score;
      winner = cat;
    }
  });

  if (maxScore <= 0) {
    winner = "genel";
  }

  return {
    winner,
    scores: info.categoryScores,
    evidence: [...new Set(info.matchedEvidence)].slice(0, 5),
    structures: info.structures.length > 0 ? info.structures : ["Standart Not"]
  };
}

// Giriş kutusuna yazarken canlı NLP analizi yapma tetikleyicisi
function runLocalNLP() {
  const text = document.getElementById("text-input").value.trim();
  const prev = document.getElementById("cat-preview");
  
  if (!text || text.length < 5) {
    prev.className = "category-preview";
    prev.innerHTML = "";
    document.getElementById("save-btn").disabled = false;
    return;
  }

  const start = performance.now();
  const analysis = analyzeNoteText(text);
  const end = performance.now();
  const duration = (end - start).toFixed(1);

  prev.className = "category-preview visible";
  
  let themeObj = THEMES[analysis.winner] || { label: "Genel", emoji: "📖", accent: "#94a3b8" };
  
  let structureText = analysis.structures.join(" | ");
  let evidenceText = analysis.evidence.length > 0 ? analysis.evidence.join(", ") : "Belirgin kanıt bulunamadı (Genel)";
  
  prev.innerHTML = `
    <div>
      <span class="ai-badge">⚡ Yerel NLP Engine (${duration} ms)</span>
    </div>
    <div style="font-size: 14px; margin: 4px 0;">
      <span>${themeObj.emoji} Kategori: <strong style="color:${themeObj.accent}">${themeObj.label}</strong></span>
    </div>
    <div class="nlp-report" style="margin-top: 4px;">
      <div class="nlp-line">
        <span class="nlp-label">⚙️ Yapı:</span> <span>${structureText}</span>
      </div>
      <div class="nlp-line">
        <span class="nlp-label">🔍 Eşleşen Kanıtlar:</span> <span>${evidenceText}</span>
      </div>
    </div>
  `;
  document.getElementById("save-btn").disabled = false;
}

function addNote() {
  const text = document.getElementById("text-input").value.trim();
  const book = document.getElementById("book-input").value.trim();
  if (!text) return;

  const analysis = analyzeNoteText(text);

  notes.unshift({
    id: Date.now(),
    text,
    book,
    theme: analysis.winner,
    structures: analysis.structures,
    evidence: analysis.evidence,
    date: new Date().toISOString(),
    aiCategorized: true
  });
  
  saveNotes();

  document.getElementById("text-input").value = "";
  document.getElementById("book-input").value = "";
  
  toggleView();
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id);
  saveNotes(); 
  renderNotes();
}

function renderFilters() {
  const usedThemes = [...new Set(notes.map(n => n.theme))];
  
  const allFilters = [
    { key: "hepsi", label: "Hepsi", emoji: "✨" },
    ...Object.entries(THEMES)
      .filter(([k]) => usedThemes.includes(k))
      .map(([k, v]) => ({ key: k, label: v.label, emoji: v.emoji })),
    ...(usedThemes.includes("genel") ? [{ key: "genel", label: "Genel", emoji: "📖" }] : [])
  ];

  document.getElementById("filters").innerHTML = allFilters.map(f =>
    `<button class="filter-btn ${activeFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.emoji} ${f.label}</button>`
  ).join("");
}

function setFilter(f) { 
  activeFilter = f; 
  renderNotes(); 
}

function renderNotes() {
  const s = document.getElementById("search").value.toLowerCase();
  
  const filtered = notes.filter(n => {
    const bookMatch = n.book && n.book.toLowerCase().includes(s);
    const textMatch = n.text.toLowerCase().includes(s);
    const structureMatch = n.structures && n.structures.some(st => st.toLowerCase().includes(s));
    const evidenceMatch = n.evidence && n.evidence.some(ev => ev.toLowerCase().includes(s));
    
    const matchesSearch = textMatch || bookMatch || structureMatch || evidenceMatch;
    const matchesFilter = activeFilter === "hepsi" || n.theme === activeFilter;
    
    return matchesSearch && matchesFilter;
  });

  document.getElementById("note-count").textContent = notes.length + " not";
  renderFilters();

  if (filtered.length === 0) {
    document.getElementById("notes-container").innerHTML =
      `<div class="empty"><div class="icon">📭</div><p>${notes.length === 0 ? "Henüz not yok. İlk notunu ekle!" : "Aranan kriterlere uygun not bulunamadı."}</p></div>`;
    return;
  }

  document.getElementById("notes-container").innerHTML = filtered.map(n => {
    let th = THEMES[n.theme];
    if (n.theme === "genel" || !th) {
      th = { emoji: "📖", bg: "#111827", border: "#475569", accent: "#94a3b8", label: "Genel" };
    }
    const date = new Date(n.date).toLocaleDateString("tr-TR", { day: "numeric", month: "long", year: "numeric" });
    
    const structuresText = (n.structures && n.structures.length > 0) ? n.structures.join(" | ") : "Standart Not";
    const evidenceText = (n.evidence && n.evidence.length > 0) ? n.evidence.join(", ") : "Yok";

    return `
      <div class="note-card" style="background:${th.bg};border-color:${th.border};border-left-color:${th.border}">
        <div class="note-watermark">${th.emoji}</div>
        <div class="note-top">
          <span class="note-badge" style="background:${th.accent}22;color:${th.accent}">${th.emoji} ${th.label}</span>
          <button class="note-delete" onclick="deleteNote(${n.id})">×</button>
        </div>
        ${n.book ? `<div class="note-book" style="color:${th.accent}">📚 ${n.book}</div>` : ""}
        <p class="note-text">${n.text}</p>
        
        <!-- Dinamik Analiz Raporu Kartı -->
        <div class="nlp-report">
          <div class="nlp-line">
            <span class="nlp-label">⚙️ Yapı:</span> <span>${structuresText}</span>
          </div>
          <div class="nlp-line">
            <span class="nlp-label">🔍 Eşleşen Kanıtlar:</span> <span>${evidenceText}</span>
          </div>
        </div>

        <div class="note-meta">
          <span class="note-date">${date}</span>
          ${n.aiCategorized ? '<span class="note-ai-tag">✦ Yerel NLP</span>' : ''}
        </div>
      </div>`;
  }).join("");
}

// ── Migration (Eski Sürüm Verileri Taşıma) ─────────────────────────
async function checkMigration() {
  const oldRaw = localStorage.getItem("kitap-notlari") || localStorage.getItem("kitap-notlari-v2");
  if (!oldRaw) return;
  const oldNotes = JSON.parse(oldRaw);
  if (!oldNotes || oldNotes.length === 0) return;
  
  const checkV3 = localStorage.getItem("kitap-notlari-v3-migrated");
  if (checkV3) return;

  document.getElementById("migration-desc").textContent =
    `Önceki veritabanınızda ${oldNotes.length} not bulundu. Bu notları yeni gelişmiş 3 Katmanlı Yerel NLP motoruyla saniyeler içinde analiz edip yeniden kategorilendirelim mi?`;
  document.getElementById("migration-status").textContent = "";
  document.getElementById("migration-bar").style.width = "0%";
  document.getElementById("migration-banner").style.display = "block";
}

function startMigration() {
  const oldRaw = localStorage.getItem("kitap-notlari") || localStorage.getItem("kitap-notlari-v2");
  if (!oldRaw) return;
  const oldNotes = JSON.parse(oldRaw);

  const btn = document.getElementById("migration-btn");
  btn.disabled = true;
  btn.textContent = "Kategorilendiriliyor...";

  const migrated = [];
  
  for (let i = 0; i < oldNotes.length; i++) {
    const n = oldNotes[i];
    const analysis = analyzeNoteText(n.text);

    migrated.push({
      ...n,
      theme: analysis.winner,
      structures: analysis.structures,
      evidence: analysis.evidence,
      aiCategorized: true
    });
  }

  notes = [...migrated, ...notes];
  
  const uniqueNotes = [];
  const map = new Map();
  for (const item of notes) {
    if(!map.has(item.id)){
        map.set(item.id, true);
        uniqueNotes.push(item);
    }
  }
  notes = uniqueNotes;
  notes.sort((a, b) => b.id - a.id);
  
  saveNotes();

  localStorage.setItem("kitap-notlari-v3-migrated", "1");
  localStorage.removeItem("kitap-notlari");
  localStorage.removeItem("kitap-notlari-v2");

  document.getElementById("migration-banner").style.display = "none";
  renderNotes();
}

loadNotes();
checkMigration();
renderNotes();
