<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Kitap Notlarım</title>
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitap Notlarım">
<link rel="manifest" href="data:application/json,{%22name%22:%22Kitap%20Notlar%C4%B1m%22,%22short_name%22:%22KitapNot%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f172a%22,%22theme_color%22:%22%230f172a%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns%3D'http://www.w3.org/2000/svg'%20viewBox%3D'0%200%20100%20100'%3E%3Ctext%20y%3D'.9em'%20font-size%3D'90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif; min-height: 100vh; }

  .header {
    background: #0f172a; border-bottom: 1px solid #1e293b;
    padding: 16px 20px; position: sticky; top: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 18px; font-weight: 800; }
  .header p { font-size: 11px; color: #475569; margin-top: 2px; }

  .btn-add {
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    color: #fff; border: none; border-radius: 12px;
    padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-back {
    background: #1e293b; color: #fff; border: none; border-radius: 12px;
    padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
  }

  .container { padding: 16px 20px; max-width: 580px; margin: 0 auto; }

  input, textarea {
    width: 100%; background: #0f172a; border: 1px solid #1e293b;
    border-radius: 12px; padding: 12px 14px; color: #f1f5f9;
    font-size: 14px; outline: none; display: block;
  }
  textarea { resize: vertical; line-height: 1.7; font-family: system-ui, sans-serif; }

  .add-box { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid #334155; }
  .add-title { font-size: 15px; font-weight: 700; color: #a5b4fc; margin-bottom: 14px; }

  .category-preview {
    background: #0f172a; border-radius: 10px; padding: 8px 12px;
    margin: 10px 0; font-size: 13px; color: #94a3b8;
    display: none; align-items: center; gap: 8px;
  }
  .category-preview.visible { display: flex; }

  .ai-badge {
    font-size: 10px; background: #312e81; color: #a5b4fc;
    padding: 2px 7px; border-radius: 20px; font-weight: 700; letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .spinner {
    width: 14px; height: 14px; border: 2px solid #334155;
    border-top-color: #6366f1; border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-save {
    width: 100%; background: linear-gradient(135deg,#6366f1,#8b5cf6);
    color: #fff; border: none; border-radius: 12px; padding: 14px;
    font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px;
    transition: opacity 0.2s;
  }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  #search { margin-bottom: 12px; }

  .filters {
    display: flex; gap: 8px; overflow-x: auto;
    margin-bottom: 14px; padding-bottom: 4px;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: #1e293b; color: #64748b; border: 1px solid #1e293b;
    border-radius: 20px; padding: 5px 12px; font-size: 12px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .filter-btn.active {
    background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff;
  }

  .empty { text-align: center; padding: 60px 0; }
  .empty .icon { font-size: 48px; }
  .empty p { margin-top: 10px; font-size: 14px; color: #334155; }

  .note-card {
    border-radius: 14px; padding: 14px 16px; margin-bottom: 12px;
    position: relative; overflow: hidden; border-left-width: 4px; border-left-style: solid;
  }
  .note-watermark {
    position: absolute; right: 10px; bottom: 4px;
    font-size: 60px; opacity: 0.08; user-select: none; line-height: 1; pointer-events: none;
  }
  .note-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .note-badge {
    font-size: 11px; font-weight: 700; padding: 2px 10px;
    border-radius: 20px; letter-spacing: 0.8px; text-transform: uppercase;
  }
  .note-delete {
    background: transparent; border: none; color: #475569;
    cursor: pointer; font-size: 20px; line-height: 1;
  }
  .note-book { font-size: 12px; font-weight: 600; margin-bottom: 6px; opacity: 0.85; }
  .note-text { font-size: 14px; line-height: 1.75; margin: 0 0 10px; color: #e2e8f0; }
  .note-meta { display: flex; justify-content: space-between; align-items: center; }
  .note-date { font-size: 11px; color: #334155; }
  .note-ai-tag { font-size: 10px; color: #4338ca; background: #1e1b4b; padding: 2px 6px; border-radius: 8px; }

  #add-view { display: none; }

  .migration-banner {
    background: #1e293b; border: 1px solid #6366f1; border-radius: 16px;
    padding: 16px 18px; margin-bottom: 16px;
  }
  .migration-banner h3 { font-size: 14px; font-weight: 700; color: #a5b4fc; margin-bottom: 6px; }
  .migration-banner p { font-size: 12px; color: #64748b; margin-bottom: 12px; line-height: 1.6; }
  .migration-progress { background: #0f172a; border-radius: 8px; height: 6px; overflow: hidden; margin-bottom: 8px; }
  .migration-bar { height: 100%; background: linear-gradient(90deg,#6366f1,#8b5cf6); border-radius: 8px; transition: width 0.4s; }
  .migration-status { font-size: 12px; color: #475569; }
  .btn-migrate {
    width: 100%; background: linear-gradient(135deg,#6366f1,#8b5cf6);
    color: #fff; border: none; border-radius: 10px; padding: 10px;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📚 Kitap Notlarım</h1>
    <p id="note-count">0 not</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="install-btn" onclick="installApp()" style="display:none;background:#1e293b;color:#a5b4fc;border:1px solid #6366f1;border-radius:12px;padding:10px 14px;font-size:12px;font-weight:700;cursor:pointer;align-items:center;gap:6px">
      📲 Yükle
    </button>
    <button class="btn-add" id="toggle-btn" onclick="toggleView()">+ Not Ekle</button>
  </div>
</div>

<div class="container">

  <div id="add-view">
    <div class="add-box">
      <div class="add-title">✏️ Yeni Not</div>
      <input type="text" id="book-input" placeholder="📖 Kitap adı (isteğe bağlı)" style="margin-bottom:10px">
      <textarea id="text-input" rows="5" placeholder="Notunu buraya yaz... Yapay zeka kategoriyi otomatik belirleyecek ✨" oninput="schedulePreview()"></textarea>
      <div class="category-preview" id="cat-preview"></div>
      <button class="btn-save" id="save-btn" onclick="addNote()">💾 Kaydet</button>
    </div>
  </div>

  <div id="list-view">
    <div id="migration-banner" style="display:none" class="migration-banner">
      <h3>🔄 Eski notlar bulundu</h3>
      <p id="migration-desc"></p>
      <div class="migration-progress"><div class="migration-bar" id="migration-bar" style="width:0%"></div></div>
      <div class="migration-status" id="migration-status"></div>
      <button class="btn-migrate" id="migration-btn" onclick="startMigration()" style="margin-top:12px">✦ AI ile Yeniden Kategorilendirmeye Başla</button>
    </div>
    <input type="text" id="search" placeholder="🔍 Not veya kitap ara..." oninput="renderNotes()">
    <div class="filters" id="filters"></div>
    <div id="notes-container"></div>
  </div>

</div>

<script>
const THEMES = {
  felsefe:    { emoji:"🏛️", bg:"#1a1200", border:"#c9a96e", accent:"#c9a96e", label:"Felsefe" },
  bilim:      { emoji:"🔬", bg:"#001a2e", border:"#67e8f9", accent:"#67e8f9", label:"Bilim" },
  tarih:      { emoji:"📜", bg:"#1a1000", border:"#fde68a", accent:"#fde68a", label:"Tarih" },
  psikoloji:  { emoji:"🧠", bg:"#1a0020", border:"#f0abfc", accent:"#f0abfc", label:"Psikoloji" },
  edebiyat:   { emoji:"✍️", bg:"#001a0e", border:"#6ee7b7", accent:"#6ee7b7", label:"Edebiyat" },
  motivasyon: { emoji:"🔥", bg:"#1a0500", border:"#fca5a5", accent:"#fca5a5", label:"Motivasyon" },
  ekonomi:    { emoji:"💹", bg:"#001810", border:"#4ade80", accent:"#4ade80", label:"Ekonomi" },
  teknoloji:  { emoji:"💻", bg:"#001020", border:"#38bdf8", accent:"#38bdf8", label:"Teknoloji" },
  genel:      { emoji:"📖", bg:"#111827", border:"#94a3b8", accent:"#94a3b8", label:"Genel" },
};

let notes = JSON.parse(localStorage.getItem("kitap-notlari-v2") || "[]");
let activeFilter = "hepsi";
let previewTimer = null;
let currentDetectedTheme = null;
let isDetecting = false;

function saveNotes() { localStorage.setItem("kitap-notlari-v2", JSON.stringify(notes)); }

function toggleView() {
  const isAdd = document.getElementById("add-view").style.display === "block";
  document.getElementById("add-view").style.display = isAdd ? "none" : "block";
  document.getElementById("list-view").style.display = isAdd ? "block" : "none";
  document.getElementById("toggle-btn").textContent = isAdd ? "+ Not Ekle" : "← Geri";
  document.getElementById("toggle-btn").className = isAdd ? "btn-add" : "btn-back";
  if (isAdd) { renderNotes(); resetPreview(); }
}

function resetPreview() {
  currentDetectedTheme = null;
  isDetecting = false;
  document.getElementById("cat-preview").className = "category-preview";
  document.getElementById("cat-preview").innerHTML = "";
  document.getElementById("save-btn").disabled = false;
}

function schedulePreview() {
  clearTimeout(previewTimer);
  const text = document.getElementById("text-input").value.trim();
  if (!text || text.length < 10) { resetPreview(); return; }

  // Yükleniyor göster
  const prev = document.getElementById("cat-preview");
  prev.className = "category-preview visible";
  prev.innerHTML = `<div class="spinner"></div><span>Yapay zeka analiz ediyor...</span>`;
  document.getElementById("save-btn").disabled = true;

  previewTimer = setTimeout(() => detectThemeWithAI(text), 900);
}

async function detectThemeWithAI(text) {
  const bookName = document.getElementById("book-input").value.trim();
  const prompt = `Hayatını kitaplara adamış birisin. Binlerce kitap okumuş, kataloglamış, raflarını doldurmuş bir insan olarak düşün — biraz kütüphaneci, biraz bilim insanı, biraz yayıncı. Elinde bir okuyucunun kitaptan aldığı not var. Bu notu okuyup "bu hangi rafta durur?" diye düşün ve en doğal, en isabetli kategoriyi seç.

Kategoriler ve hangi ruhu taşıdıkları:

felsefe → "Neden?", "Ne anlam ifade ediyor?", "Doğru nedir?" diye soran notlar. Varoluş, anlam, özgürlük, ahlak. Şiirsel bile yazılmış olsa içinde derin bir soru varsa buraya girer.

edebiyat → Dilin kendisi güzel. Metafor, imge, şiirsellik ön planda. Bir romanın karakteri, bir şiirin etkisi, yazarın dili üzerine düşünceler.

psikoloji → İnsan zihni ve duyguları üzerine. Davranışlar, ilişkiler, bilinçaltı, duygusal örüntüler, öz farkındalık.

bilim → Doğanın işleyişi. Evren, atom, evrim, matematik, keşifler, deneyler.

tarih → Geçmişin izleri. Olaylar, medeniyetler, dönemler, toplumların dönüşümü.

motivasyon → Harekete geçiren notlar. Hedef, azim, cesaret, ilham, "yapabilirsin" enerjisi.

ekonomi → Para, piyasalar, üretim, tüketim, toplumsal refah, sistemler.

teknoloji → Dijital dünya, yapay zeka, yazılım, inovasyon, geleceğin şekli.

genel → Gerçekten hiçbir rafa uymuyorsa.

${bookName ? `Kitap adı: ${bookName}` : ""}
Not: "${text}"

Tek kelime, sadece kategori adı:`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 20,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text?.trim().toLowerCase() || "genel";
    const detected = THEMES[raw] ? raw : "genel";

    currentDetectedTheme = detected;
    const th = THEMES[detected];
    const prev = document.getElementById("cat-preview");
    prev.className = "category-preview visible";
    prev.innerHTML = `
      <span class="ai-badge">✦ AI</span>
      <span>${th.emoji} Kategori: <strong style="color:${th.accent}">${th.label}</strong></span>
    `;
    document.getElementById("save-btn").disabled = false;
  } catch (e) {
    currentDetectedTheme = "genel";
    const prev = document.getElementById("cat-preview");
    prev.className = "category-preview visible";
    prev.innerHTML = `<span style="color:#475569">⚠️ AI erişilemedi, genel kategori kullanılacak</span>`;
    document.getElementById("save-btn").disabled = false;
  }
}

async function addNote() {
  const text = document.getElementById("text-input").value.trim();
  const book = document.getElementById("book-input").value.trim();
  if (!text) return;

  const saveBtn = document.getElementById("save-btn");
  saveBtn.disabled = true;
  saveBtn.textContent = "Kaydediliyor...";

  let theme = currentDetectedTheme;

  // Eğer henüz tespit yapılmamışsa şimdi yap
  if (!theme) {
    await detectThemeWithAI(text);
    theme = currentDetectedTheme || "genel";
  }

  notes.unshift({
    id: Date.now(), text, book, theme,
    date: new Date().toISOString(), aiCategorized: true
  });
  saveNotes();

  document.getElementById("text-input").value = "";
  document.getElementById("book-input").value = "";
  currentDetectedTheme = null;

  saveBtn.textContent = "💾 Kaydet";
  saveBtn.disabled = false;
  toggleView();
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id);
  saveNotes(); renderNotes();
}

function renderFilters() {
  const usedThemes = [...new Set(notes.map(n => n.theme))];
  const allFilters = [{ key:"hepsi", label:"Hepsi", emoji:"✨" },
    ...Object.entries(THEMES)
      .filter(([k]) => usedThemes.includes(k))
      .map(([k,v]) => ({ key:k, label:v.label, emoji:v.emoji }))
  ];
  document.getElementById("filters").innerHTML = allFilters.map(f =>
    `<button class="filter-btn ${activeFilter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.emoji} ${f.label}</button>`
  ).join("");
}

function setFilter(f) { activeFilter = f; renderNotes(); }

function renderNotes() {
  const s = document.getElementById("search").value.toLowerCase();
  const filtered = notes.filter(n =>
    (n.text.toLowerCase().includes(s) || (n.book && n.book.toLowerCase().includes(s))) &&
    (activeFilter === "hepsi" || n.theme === activeFilter)
  );
  document.getElementById("note-count").textContent = notes.length + " not";
  renderFilters();

  if (filtered.length === 0) {
    document.getElementById("notes-container").innerHTML =
      `<div class="empty"><div class="icon">📭</div><p>${notes.length===0 ? "Henüz not yok. İlk notunu ekle!" : "Sonuç bulunamadı."}</p></div>`;
    return;
  }

  document.getElementById("notes-container").innerHTML = filtered.map(n => {
    const th = THEMES[n.theme] || THEMES.genel;
    const date = new Date(n.date).toLocaleDateString("tr-TR", { day:"numeric", month:"long", year:"numeric" });
    return `
      <div class="note-card" style="background:${th.bg};border-color:${th.border};border-left-color:${th.border}">
        <div class="note-watermark">${th.emoji}</div>
        <div class="note-top">
          <span class="note-badge" style="background:${th.accent}22;color:${th.accent}">${th.emoji} ${th.label}</span>
          <button class="note-delete" onclick="deleteNote(${n.id})">×</button>
        </div>
        ${n.book ? `<div class="note-book" style="color:${th.accent}">📚 ${n.book}</div>` : ""}
        <p class="note-text">${n.text}</p>
        <div class="note-meta">
          <span class="note-date">${date}</span>
          ${n.aiCategorized ? '<span class="note-ai-tag">✦ AI</span>' : ''}
        </div>
      </div>`;
  }).join("");
}

// ── Migration ──────────────────────────────────────────────
async function checkMigration() {
  const oldRaw = localStorage.getItem("kitap-notlari");
  if (!oldRaw) return;
  const oldNotes = JSON.parse(oldRaw);
  if (!oldNotes || oldNotes.length === 0) { localStorage.removeItem("kitap-notlari"); return; }
  if (localStorage.getItem("kitap-notlari-migrated")) { localStorage.removeItem("kitap-notlari"); return; }

  document.getElementById("migration-desc").textContent =
    `Eski uygulamandan ${oldNotes.length} not bulundu. Yapay zeka ile yeniden kategorilendirip aktaralım mı?`;
  document.getElementById("migration-status").textContent = "";
  document.getElementById("migration-bar").style.width = "0%";
  document.getElementById("migration-banner").style.display = "block";
}

async function startMigration() {
  const oldRaw = localStorage.getItem("kitap-notlari");
  if (!oldRaw) return;
  const oldNotes = JSON.parse(oldRaw);

  const btn = document.getElementById("migration-btn");
  btn.disabled = true;
  btn.textContent = "Kategorilendiriliyor...";

  const migrated = [];
  for (let i = 0; i < oldNotes.length; i++) {
    const n = oldNotes[i];
    document.getElementById("migration-status").textContent = `${i + 1} / ${oldNotes.length} not işlendi`;
    document.getElementById("migration-bar").style.width = Math.round(((i + 1) / oldNotes.length) * 100) + "%";

    let theme = "genel";
    try {
      const prompt = `Hayatını kitaplara adamış birisin — kütüphaneci, bilim insanı, yayıncı karışımı. Elindeki notu oku ve "bu hangi rafta durur?" diye düşün.\n\nRaflar: felsefe (varoluş, anlam, etik sorular), edebiyat (şiirsel dil, metafor, edebi düşünce), psikoloji (insan zihni, duygular, davranış), bilim (doğa, evren, keşifler), tarih (geçmiş, medeniyetler, olaylar), motivasyon (ilham, azim, harekete geçirme), ekonomi (para, piyasa, sistemler), teknoloji (dijital, yapay zeka, inovasyon), genel (hiçbir rafa uymuyorsa).\n\n${n.book ? `Kitap: ${n.book}\n` : ""}Not: "${n.text}"\n\nSadece tek kelime:`;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 20, messages: [{ role: "user", content: prompt }] })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text?.trim().toLowerCase() || "genel";
      theme = THEMES[raw] ? raw : "genel";
    } catch (e) { theme = n.theme || "genel"; }

    migrated.push({ ...n, theme, aiCategorized: true });
    await new Promise(r => setTimeout(r, 300));
  }

  notes = [...notes, ...migrated];
  notes.sort((a, b) => b.id - a.id);
  saveNotes();

  localStorage.setItem("kitap-notlari-migrated", "1");
  localStorage.removeItem("kitap-notlari");

  document.getElementById("migration-banner").style.display = "none";
  renderNotes();
}

checkMigration();
renderNotes();

// ── PWA: Service Worker ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'kitap-notlari-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ── PWA: Ana Ekrana Ekle Butonu ─────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'flex';
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-btn').style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').style.display = 'none';
});
</script>
</body>
</html>
